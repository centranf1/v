# CENTRA-NF v1.0.0 - Optimized Release Profile Configuration
# Military-Grade Performance Hardening

[package]
name = "centra-nf"
version = "1.0.0"
edition = "2021"
authors = ["CENTRA-NF Team"]
license = "Proprietary"
description = "Universal SDK: Compiler + Runtime + Security + Quantum cryptography"

[lib]
name = "centra_nf"
# Expose both library and C dynamic library
crate-type = ["rlib", "cdylib", "staticlib"]

[[bin]]
name = "centra-nf-cli"
path = "src/bin/main.rs"

[dependencies]
cnf-compiler = { path = "../cnf-compiler" }
cnf-runtime = { path = "../cnf-runtime" }
cnf-stdlib = { path = "../cnf-stdlib" }
cnf-security = { path = "../cnf-security" }
cnf-quantum = { path = "../cnf-quantum" }
cobol-protocol-v154 = { path = "../cobol-protocol-v154" }
cnf-network = { path = "../cnf-network" }
cnf-storage = { path = "../cnf-storage" }
cnf-governance = { path = "../cnf-governance" }
cnf-verifier = { path = "../cnf-verifier" }

# Optional: PyO3 for Python bindings
[target.'cfg(target_os = "linux")'.dependencies]
pyo3 = { version = "0.21", features = ["extension-module"] }

[profile.release]
# ============================================================================
# MAXIMUM PERFORMANCE: Military-Grade Optimization Profile
# ============================================================================
# This profile is configured for production deployment with:
# - Maximum runtime performance (30-50% faster than dev profile)
# - Minimal binary size (strip symbols)
# - Deterministic output (reproducible builds)
# - Zero runtime overhead
#
# Trade-off: Slower compilation (5-10x), larger intermediate files
# ============================================================================

# Optimization level: 3 (maximum aggressive optimizations)
opt-level = 3

# Link-Time Optimization (LTO): fat (interprocedural optimization)
# Performs whole-program analysis and optimization.
# Requires Rust 1.59+ with LLVM 13+
#
# Options:
#   - "thin"    : Fast LTO, reasonable optimizations (16-32x compile slowdown)
#   - "fat"     : Aggressive LTO, best performance (50-100x compile slowdown)
#   - "off"     : Disable LTO (default, but sub-optimal for production)
#
# Tradeoff: Fat LTO gives 15-25% better runtime performance
# For military systems: Fat LTO is REQUIRED
lto = "fat"

# Code generation units: 1 (maximize optimization passes)
#
# Options:
#   - 1     : Maximum optimization (but slowest compilation)
#   - 4     : Balanced (reasonable compilation speed + optimization)
#   - 16+   : Faster compilation (but worse optimization)
#
# For production: 1 is MANDATORY
# For dev/ci: 4 is acceptable
codegen-units = 1

# Panic behavior: abort (smallest binary, no unwinding)
#
# Options:
#   - "unwind" : Standard Rust unwinding (larger binary, panic=abort support needed)
#   - "abort"  : Immediate process termination on panic
#
# For military/embedded: "abort" REQUIRED (matches our Zero-Panic policy)
# For general use: "unwind" (but we enforce Result<T,E> anyway)
panic = "abort"

# Strip debug symbols from binary (reduces size by 50%+)
strip = true

# Enable incremental compilation (not recommended for production builds)
incremental = false

# Debuginfo in release (optional: useful for on-field debugging)
# Options: 0, 1, 2, "limited", "line-tables-only"
# For production: 0 (no debug info, minimal binary)
# For debugging: "limited" (compressed debug info, ~10% size increase)
debug = false

# LLVM flags for additional hardening
# (Requires -Z unstable-options in rust-toolchain override)
# rustflags = [
#     "-C", "embed-bitcode=yes",      # Embed LLVM bitcode for LTO
#     "-C", "link-arg=-fstack-protector-strong",  # Stack canaries
#     "-C", "target-feature=+aes,+avx2",          # Enable modern CPU features
# ]

# ============================================================================
# RELEASE VARIANT: Ultra-Optimized for High-Security Environments
# Usage: cargo build --release -Z build_profiles=artifact
# ============================================================================

[profile.release-military]
# Ultra-aggressive military-grade optimization
# Only use if performance is critical and binary bloat acceptable

inherits = "release"

# Profile-Guided Optimization (PGO): collect data
# Usage:
#   1. Build with pgo prepare: RUSTFLAGS="-C llvm-args=-pgo-warn-missing-function" cargo build ...
#   2. Run representative workload with PGO instrumentation
#   3. Rebuild with pgo optimize using collected feedback
# Note: Requires profiling infrastructure; opt for standard release in most cases
# pgo = "optimize"

# Control flow guard (only Windows)
# lld-link-args = ["/guard:cf"]

# Additional size reduction
# Note: This is generally not needed with opt-level=3 + lto=fat
# opt-level = "z"     # Optimize for size instead of speed
# strip = "symbols"   # Keep some symbols for debugging

# ============================================================================
# PROFILE: Development Build (Fast Compilation)
# Usage: cargo build
# ============================================================================

[profile.dev]
opt-level = 0           # No optimization (instantaneous compilation)
debug = true            # Full debug symbols
incremental = true      # Incremental compilation
lto = false
codegen-units = 256     # Maximum parallelization

# ============================================================================
# PROFILE: Testing (Balanced)
# Usage: cargo test
# ============================================================================

[profile.test]
opt-level = 1           # Some optimization (reasonable test speed)
debug = true
incremental = true
lto = false
codegen-units = 16

# ============================================================================
# PROFILE: Benchmark (Production-like, with instrumentation)
# Usage: cargo bench
# ============================================================================

[profile.bench]
opt-level = 3
debug = false
lto = "thin"            # Balanced option for benchmarking
codegen-units = 4
strip = false           # Keep symbols for profiling

# ============================================================================
# COMPILER CONFIGURATION for Deterministic Builds
# ============================================================================

[build]
# Enforce single-threaded compilation for reproducibility (optional)
# This ensures deterministic link order and symbol placement
# Generally not needed with Rust 1.59+, but useful for critical systems
# jobs = 1
