name: CI Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-action@v1
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Gate 1 - Compilation Check
        run: cargo check --all --verbose

      - name: Gate 2 - Unit Tests
        run: cargo test --all --lib --verbose

      - name: Gate 3 - Code Format
        run: cargo fmt --all -- --check

      - name: Gate 4 - Linting
        run: cargo clippy --all -- -D warnings

      - name: Gate 5 - Build Release
        run: cargo build --all --release

  determinism-check:
    name: Determinism Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-action@v1
        with:
          toolchain: stable

      - name: Build twice and verify identical IR
        run: |
          cargo build --all --release 2>&1 | tee build1.log
          cargo clean
          cargo build --all --release 2>&1 | tee build2.log
          # Both builds should complete successfully
          grep -q "Finished" build1.log && grep -q "Finished" build2.log

  layer-discipline:
    name: Layer Boundary Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify cobol-protocol-v153 is untouched
        run: |
          # Check that ONLY cobol-protocol-v153/src/lib.rs contains compression logic
          if grep -r "compress_l1_l3" crates/cnf-runtime/src/ 2>/dev/null; then
            echo "ERROR: Runtime should NOT contain compression logic"
            exit 1
          fi
          if grep -r "compress_l1_l3" crates/cnf-compiler/src/ 2>/dev/null; then
            echo "ERROR: Compiler should NOT contain compression logic"
            exit 1
          fi
          echo "✓ Protocol layer boundary intact"

      - name: Verify crypto is sealed in cnf-security
        run: |
          # Check that ONLY cnf-security contains sha256
          if grep -r "Sha256" crates/cnf-runtime/src/ 2>/dev/null; then
            echo "ERROR: Runtime should NOT contain crypto logic"
            exit 1
          fi
          if grep -r "Sha256" crates/cnf-compiler/src/ 2>/dev/null; then
            echo "ERROR: Compiler should NOT contain crypto logic"
            exit 1
          fi
          echo "✓ Security layer boundary intact"

